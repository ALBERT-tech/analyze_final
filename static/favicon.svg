<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Робот в очках">
  <defs>
    <linearGradient id="rt-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27A0A1"/>
      <stop offset="1" stop-color="#1B7577"/>
    </linearGradient>
  </defs>

  <!-- антенна -->
  <line x1="32" y1="16" x2="32" y2="9" stroke="#134252" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="6" r="3.5" fill="#27A0A1" stroke="#134252" stroke-width="2"/>

  <!-- "уши" -->
  <rect x="4.5" y="29" width="6" height="11" rx="3" fill="#1B7577"/>
  <rect x="53.5" y="29" width="6" height="11" rx="3" fill="#1B7577"/>

  <!-- голова -->
  <rect x="10" y="16" width="44" height="38" rx="12" fill="url(#rt-face)" stroke="#134252" stroke-width="2"/>

  <!-- дужки очков -->
  <path d="M14.5 32 L9.5 30.5" stroke="#134252" stroke-width="3" stroke-linecap="round"/>
  <path d="M49.5 32 L54.5 30.5" stroke="#134252" stroke-width="3" stroke-linecap="round"/>

  <!-- переносица -->
  <path d="M29.5 32 Q32 29.5 34.5 32" stroke="#134252" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- линзы -->
  <circle cx="23" cy="34" r="8.5" fill="#FFFFFF" stroke="#134252" stroke-width="3.5"/>
  <circle cx="41" cy="34" r="8.5" fill="#FFFFFF" stroke="#134252" stroke-width="3.5"/>

  <!-- зрачки -->
  <circle cx="23" cy="34.5" r="3" fill="#134252"/>
  <circle cx="41" cy="34.5" r="3" fill="#134252"/>

  <!-- улыбка -->
  <path d="M25 46.5 Q32 51.5 39 46.5" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
