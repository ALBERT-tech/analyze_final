<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль — Анализатор</title>
<style>
:root { --primary: #208C8D; --bg: #FCFCF9; --surface: #FFFFFF; --text: #134252; --border: #E0E0E0; --error: #C0152F; --green: #2e7d32; --radius: 8px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
h1 { font-size: 18px; margin-bottom: 20px; }
label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px; }
input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; margin-bottom: 16px; }
input:focus { outline: none; border-color: var(--primary); }
button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; margin-bottom: 8px; }
button:hover { background: #1B7577; }
.msg { font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
.msg.ok { color: var(--green); }
.msg.err { color: var(--error); }
a { color: var(--primary); text-decoration: none; font-size: 13px; display: block; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <h1>Смена пароля</h1>
  <div class="msg" id="msg"></div>
  <form id="form">
    <label>Текущий пароль</label>
    <input type="password" id="oldPw" required>
    <label>Новый пароль</label>
    <input type="password" id="newPw" required>
    <label>Подтверждение</label>
    <input type="password" id="newPw2" required>
    <button type="submit">Сменить пароль</button>
  </form>
  <a href="/">Назад к анализатору</a>
</div>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.style.display = 'none';

  const newPw = document.getElementById('newPw').value;
  if (newPw !== document.getElementById('newPw2').value) {
    msg.className = 'msg err'; msg.textContent = 'Пароли не совпадают'; msg.style.display = 'block';
    return;
  }

  const r = await fetch('/auth/change_password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({old_password: document.getElementById('oldPw').value, new_password: newPw}),
  });
  const d = await r.json();
  if (d.ok) {
    msg.className = 'msg ok'; msg.textContent = 'Пароль изменён';
  } else {
    msg.className = 'msg err'; msg.textContent = d.detail || 'Ошибка';
  }
  msg.style.display = 'block';
});
</script>
</body>
</html>
