<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Анализатор тендерной документации</title>
<style>
:root { --primary: #208C8D; --primary-dark: #1B7577; --bg: #FCFCF9; --surface: #FFFFFF; --text: #134252; --border: #E0E0E0; --error: #C0152F; --radius: 8px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
h1 { font-size: 20px; text-align: center; margin-bottom: 24px; }
label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px; }
input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; margin-bottom: 16px; }
input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(32,140,141,0.1); }
button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; }
button:hover { background: var(--primary-dark); }
.error { color: var(--error); font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="login-card">
  <h1>Анализатор тендерной документации</h1>
  <div class="error" id="error"></div>
  <form id="loginForm">
    <label>Логин</label>
    <input type="text" id="login" autocomplete="username" required>
    <label>Пароль</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit">Войти</button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        login: document.getElementById('login').value,
        password: document.getElementById('password').value,
      }),
    });
    const d = await r.json();
    if (d.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = d.detail || 'Неверный логин или пароль';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Ошибка соединения';
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
